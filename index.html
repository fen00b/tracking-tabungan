<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dompetku — Money Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #00e89a;
    --green-dim: #00e89a22;
    --red: #ff4f4f;
    --red-dim: #ff4f4f22;
    --amber: #ffb347;
    --amber-dim: #ffb34722;
    --blue: #4fa3ff;
    --blue-dim: #4fa3ff22;
    --pink: #ff6eb4;
    --purple: #a78bfa;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--green); }
  .header-date { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }

  .container { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem 6rem; }

  /* Stats row */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
  }
  .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 4px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* Section card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text2);
    margin-bottom: 14px;
  }

  /* Checklist */
  .bill-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .bill-item:last-child { border-bottom: none; }
  .bill-left { display: flex; align-items: center; gap: 10px; }
  .bill-check {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    border: 1.5px solid var(--border2); display: flex; align-items: center;
    justify-content: center; font-size: 11px; transition: all 0.15s;
  }
  .bill-check.paid { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .bill-check.unpaid { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .bill-name { font-size: 13px; color: var(--text); }
  .bill-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .bill-amt { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text2); }
  .bill-amt.paid { color: var(--green); }
  .bill-amt.unpaid { color: var(--red); }

  /* Summary */
  .summary-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { display: flex; align-items: center; gap: 7px; color: var(--text2); }
  .summary-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .summary-amt { font-family: 'DM Mono', monospace; font-size: 13px; }
  .summary-total {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2);
    font-size: 13px; font-weight: 500;
  }

  /* Type toggle */
  .type-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
  .type-btn {
    flex: 1; padding: 8px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); font-size: 13px; font-weight: 500;
    cursor: pointer; text-align: center; background: var(--surface2);
    color: var(--text2); font-family: 'Sora', sans-serif;
    transition: all 0.15s;
  }
  .type-btn.active-out { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .type-btn.active-in { background: var(--green-dim); color: var(--green); border-color: var(--green); }

  /* Form inputs */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-row-3 { display: grid; grid-template-columns: 120px 1fr; gap: 8px; margin-bottom: 8px; }
  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--green); }
  input::placeholder { color: var(--text3); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
  select option { background: var(--surface2); }
  select optgroup { background: var(--surface); color: var(--text2); font-size: 11px; }
  .add-btn {
    width: 100%;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    font-size: 13px; font-weight: 600;
    cursor: pointer; background: var(--surface2);
    color: var(--text); font-family: 'Sora', sans-serif;
    transition: all 0.15s; margin-top: 4px;
  }
  .add-btn:hover { background: var(--border); }
  .add-btn.out-btn { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .add-btn.in-btn { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .add-btn:active { transform: scale(0.98); }

  /* Log */
  .log-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .log-tab {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); font-size: 12px;
    cursor: pointer; color: var(--text2);
    background: transparent; font-family: 'Sora', sans-serif;
    transition: all 0.15s;
  }
  .log-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .log-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .log-item:last-child { border-bottom: none; }
  .log-left { display: flex; align-items: center; gap: 10px; }
  .log-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .log-icon.out { background: var(--red-dim); }
  .log-icon.in { background: var(--green-dim); }
  .log-desc { font-size: 13px; color: var(--text); line-height: 1.3; }
  .log-meta { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .log-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .log-amt { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .log-amt.out { color: var(--red); }
  .log-amt.in { color: var(--green); }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px; padding: 2px 4px;
    transition: color 0.15s; line-height: 1;
  }
  .del-btn:hover { color: var(--red); }
  .empty { font-size: 13px; color: var(--text3); text-align: center; padding: 24px 0; }

  /* Settings toggle */
  .settings-toggle {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .settings-body { margin-top: 14px; display: none; }
  .settings-body.open { display: block; }
  .chevron { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .settings-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }

  /* Export btn */
  .export-btn {
    width: 100%; padding: 9px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); font-size: 12px;
    cursor: pointer; background: transparent; color: var(--text2);
    font-family: 'Sora', sans-serif; margin-top: 8px; transition: all 0.15s;
  }
  .export-btn:hover { background: var(--surface2); color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">dompet<span>ku</span></div>
  <div class="header-date" id="header-date"></div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid" id="stats"></div>

  <!-- Bill checklist + summary (hidden when no data) -->
  <div class="card" id="bill-card" style="display:none">
    <div class="card-title">Tagihan Bulan Ini</div>
    <div id="bill-list"></div>
    <div id="alloc-summary" style="margin-top:14px;"></div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-title">Catat Transaksi</div>
    <div class="type-toggle">
      <div class="type-btn active-out" id="btn-out" onclick="setType('out')">− Pengeluaran</div>
      <div class="type-btn" id="btn-in" onclick="setType('in')">+ Pemasukan</div>
    </div>
    <div class="form-row-3">
      <input type="number" id="amt" placeholder="Jumlah (Rp)" />
      <input type="text" id="desc" placeholder="Keterangan..." />
    </div>
    <div class="form-row">
      <select id="cat">
        <optgroup label="Kebutuhan Harian">
          <option>Makan & minum</option>
          <option>Transport</option>
          <option>Belanja</option>
          <option>Jajan</option>
        </optgroup>
        <optgroup label="Tagihan Rutin">
          <option>Sewa</option>
          <option>Listrik</option>
          <option>Internet</option>
          <option>BPJS</option>
          <option>Air / PAM</option>
          <option>Tagihan lainnya</option>
        </optgroup>
        <optgroup label="Lainnya">
          <option>Kesehatan</option>
          <option>Hiburan</option>
          <option>Darurat</option>
          <option>Lainnya</option>
        </optgroup>
      </select>
      <select id="inc-cat" style="display:none">
        <optgroup label="Pemasukan">
          <option>Gaji</option>
          <option>Uang makan</option>
          <option>Bonus</option>
          <option>Freelance</option>
          <option>Transfer masuk</option>
          <option>Lainnya</option>
        </optgroup>
      </select>
      <input type="date" id="entry-date" />
    </div>
    <button class="add-btn out-btn" id="add-btn" onclick="addEntry()">+ Tambah Pengeluaran</button>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="log-tabs">
      <div class="log-tab active" onclick="setTab('today')">Hari ini</div>
      <div class="log-tab" onclick="setTab('all')">Semua</div>
      <div class="log-tab" onclick="setTab('bills')">Tagihan</div>
    </div>
    <div id="log-wrap"></div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="settings-toggle" onclick="toggleSettings()">
      <div class="card-title" style="margin-bottom:0">Pengaturan</div>
      <span class="chevron" id="chevron">▼</span>
    </div>
    <div class="settings-body" id="settings-body">
      <div class="settings-grid">
        <div>
          <div class="settings-label">Tanggal gajian berikutnya</div>
          <input type="date" id="payday" oninput="save();render()" />
        </div>
        <div>
          <div class="settings-label">Target harian (Rp)</div>
          <input type="number" id="daily_target" value="50000" oninput="save();render()" />
        </div>
      </div>
      <div style="border-top:1px solid var(--border);margin:12px 0 10px;"></div>
      <div class="settings-label" style="margin-bottom:8px">Gaji & Alokasi</div>
      <div class="settings-grid">
        <div>
          <div class="settings-label">Gaji bulanan</div>
          <input type="number" id="s_salary" placeholder="4400000" oninput="save();render()" />
        </div>
        <div>
          <div class="settings-label">Kebutuhan harian</div>
          <input type="number" id="s_harian" placeholder="1500000" oninput="save();render()" />
        </div>
        <div>
          <div class="settings-label">Sewa</div>
          <input type="number" id="s_sewa" placeholder="1000000" oninput="save();render()" />
        </div>
        <div>
          <div class="settings-label">BPJS</div>
          <input type="number" id="s_bpjs" placeholder="300000" oninput="save();render()" />
        </div>
        <div>
          <div class="settings-label">Listrik</div>
          <input type="number" id="s_listrik" placeholder="200000" oninput="save();render()" />
        </div>
        <div>
          <div class="settings-label">Internet</div>
          <input type="number" id="s_internet" placeholder="100000" oninput="save();render()" />
        </div>
      </div>
      <div id="savings-preview" style="font-size:12px;color:var(--text2);margin-top:4px;margin-bottom:10px;"></div>
      <button class="export-btn" onclick="exportCSV()">⬇ Export data ke CSV</button>
      <button class="export-btn" onclick="clearData()" style="color:var(--red);border-color:var(--red);margin-top:4px">🗑 Reset semua data</button>
    </div>
  </div>

</div>

<script>
function getAllocs() {
  const salary = +state.salary || 4400000;
  const harian  = +state.alloc_harian  || 0;
  const sewa    = +state.alloc_sewa    || 0;
  const bpjs    = +state.alloc_bpjs    || 0;
  const listrik = +state.alloc_listrik || 0;
  const internet= +state.alloc_internet|| 0;
  const tabungan = Math.max(0, salary - harian - sewa - bpjs - listrik - internet);
  return [
    { name: 'Kebutuhan harian', amt: harian,   color: '#00e89a' },
    { name: 'Sewa',             amt: sewa,     color: '#4fa3ff' },
    { name: 'BPJS',             amt: bpjs,     color: '#ff6eb4' },
    { name: 'Listrik',          amt: listrik,  color: '#ffb347' },
    { name: 'Internet',         amt: internet, color: '#a78bfa' },
    { name: 'Tabungan',         amt: tabungan, color: '#39e896' },
  ];
}
const CAT_ICONS = {
  'Makan & minum':'🍜','Transport':'🚗','Belanja':'🛍','Jajan':'🧋',
  'Sewa':'🏠','Listrik':'⚡','Internet':'📡','BPJS':'🏥',
  'Air / PAM':'💧','Tagihan lainnya':'📋',
  'Kesehatan':'💊','Hiburan':'🎮','Darurat':'🚨','Lainnya':'📌',
  'Gaji':'💵','Uang makan':'🍱','Bonus':'🎉','Freelance':'💼',
  'Transfer masuk':'💸',
};

const DEFAULT_STATE = {
  payday: '', daily_target: 50000, entries: [],
  salary: 4400000,
  alloc_harian: 1500000,
  alloc_sewa: 1000000,
  alloc_bpjs: 300000,
  alloc_listrik: 200000,
  alloc_internet: 100000,
};

let state = { ...DEFAULT_STATE };
let activeTab = 'today';
let entryType = 'out';
let settingsOpen = false;

try { const s = localStorage.getItem('dompetku_v1'); if (s) state = { ...DEFAULT_STATE, ...JSON.parse(s) }; } catch(e){}

function save() {
  state.payday       = document.getElementById('payday').value || '';
  state.daily_target = +document.getElementById('daily_target').value || 50000;
  state.salary       = +document.getElementById('s_salary').value   || 4400000;
  state.alloc_harian = +document.getElementById('s_harian').value   || 0;
  state.alloc_sewa   = +document.getElementById('s_sewa').value     || 0;
  state.alloc_bpjs   = +document.getElementById('s_bpjs').value     || 0;
  state.alloc_listrik= +document.getElementById('s_listrik').value  || 0;
  state.alloc_internet=+document.getElementById('s_internet').value || 0;
  try { localStorage.setItem('dompetku_v1', JSON.stringify(state)); } catch(e){}
}

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fmt(n) { return 'Rp '+Math.round(n).toLocaleString('id-ID'); }
function fmtShort(n) {
  n = Math.round(n);
  if (n >= 1000000) return 'Rp '+(n/1000000).toFixed(1).replace('.0','')+'jt';
  if (n >= 1000) return 'Rp '+(n/1000).toFixed(0)+'rb';
  return 'Rp '+n;
}

function daysUntilPay() {
  if (!state.payday) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const pay = new Date(state.payday);
  const diff = Math.ceil((pay - now) / 86400000);
  return diff > 0 ? diff : 0;
}

function calcAll() {
  let spent = 0, extraIncome = 0;
  const DAILY_CATS = ['Sewa','Listrik','Internet','BPJS','Air / PAM','Tagihan lainnya'];
  state.entries.forEach(e => {
    if (e.type === 'in' && e.cat !== 'Gaji') extraIncome += e.amt;
    else if (e.type === 'out' && !DAILY_CATS.includes(e.cat)) spent += e.amt;
  });
  return { spent, extraIncome };
}

function calcToday() {
  const t = todayStr();
  const BILL_CATS = ['Sewa','Listrik','Internet','BPJS','Air / PAM','Tagihan lainnya'];
  let spent = 0, income = 0;
  state.entries.filter(e => e.date === t).forEach(e => {
    if (e.type==='in' && e.cat !== 'Gaji') income += e.amt;
    else if (e.type==='out' && !BILL_CATS.includes(e.cat)) spent += e.amt;
  });
  return { spent, income };
}

function setType(t) {
  entryType = t;
  document.getElementById('btn-out').className = 'type-btn'+(t==='out'?' active-out':'');
  document.getElementById('btn-in').className = 'type-btn'+(t==='in'?' active-in':'');
  document.getElementById('cat').style.display = t==='out' ? '' : 'none';
  document.getElementById('inc-cat').style.display = t==='in' ? '' : 'none';
  const btn = document.getElementById('add-btn');
  btn.className = 'add-btn '+(t==='out'?'out-btn':'in-btn');
  btn.textContent = t==='out' ? '+ Tambah Pengeluaran' : '+ Tambah Pemasukan';
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-body').className = 'settings-body'+(settingsOpen?' open':'');
  document.getElementById('chevron').className = 'chevron'+(settingsOpen?' open':'');
}

function render() {
  // Header date
  const now = new Date();
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  // Sync settings inputs
  document.getElementById('payday').value        = state.payday || '';
  document.getElementById('daily_target').value  = state.daily_target;
  document.getElementById('s_salary').value      = state.salary      || 4400000;
  document.getElementById('s_harian').value      = state.alloc_harian  || 1500000;
  document.getElementById('s_sewa').value        = state.alloc_sewa    || 1000000;
  document.getElementById('s_bpjs').value        = state.alloc_bpjs    || 300000;
  document.getElementById('s_listrik').value     = state.alloc_listrik || 200000;
  document.getElementById('s_internet').value    = state.alloc_internet|| 100000;

  const ALLOCS = getAllocs();
  const SALARY = +state.salary || 4400000;

  // Default entry date to today
  if (!document.getElementById('entry-date').value) {
    document.getElementById('entry-date').value = todayStr();
  }

  // Bill checklist + summary
  const BILL_CATS = ['Sewa','Listrik','Internet','BPJS','Air / PAM','Tagihan lainnya'];
  const BILL_COLORS = { 'Sewa':'#4fa3ff','Listrik':'#ffb347','Internet':'#a78bfa','BPJS':'#ff6eb4','Air / PAM':'#4fa3ff','Tagihan lainnya':'#888' };

  // Current month entries
  const nowM = new Date();
  const thisMonth = nowM.getFullYear()+'-'+String(nowM.getMonth()+1).padStart(2,'0');

  // All entries this month
  const monthEntries = state.entries.filter(e => e.date && e.date.startsWith(thisMonth));

  // Income this month
  const monthIncome = monthEntries.filter(e => e.type==='in').reduce((s,e)=>s+e.amt,0);
  // Daily spend this month (non-bill)
  const monthDailySpend = monthEntries.filter(e => e.type==='out' && !BILL_CATS.includes(e.cat)).reduce((s,e)=>s+e.amt,0);
  // Bills paid this month per category
  const billsPaid = {};
  monthEntries.filter(e => e.type==='out' && BILL_CATS.includes(e.cat)).forEach(e => {
    if (!billsPaid[e.cat]) billsPaid[e.cat] = { total:0, date:e.date };
    billsPaid[e.cat].total += e.amt;
    if (e.date > billsPaid[e.cat].date) billsPaid[e.cat].date = e.date;
  });

  const billCard = document.getElementById('bill-card');
  if (state.entries.length === 0) {
    billCard.style.display = 'none';
  } else {
    billCard.style.display = '';

    // Build checklist from configured bills
    const configuredBills = [
      { cat:'Sewa',     amt: +state.alloc_sewa    || 0 },
      { cat:'Listrik',  amt: +state.alloc_listrik || 0 },
      { cat:'Internet', amt: +state.alloc_internet|| 0 },
      { cat:'BPJS',     amt: +state.alloc_bpjs    || 0 },
    ].filter(b => b.amt > 0);

    // Also include any bill cats that appear in entries but aren't configured
    const extraBillCats = [...new Set(
      monthEntries.filter(e=>e.type==='out'&&BILL_CATS.includes(e.cat)).map(e=>e.cat)
    )].filter(c => !configuredBills.find(b=>b.cat===c));
    extraBillCats.forEach(c => configuredBills.push({ cat:c, amt: billsPaid[c]?.total||0 }));

    document.getElementById('bill-list').innerHTML = configuredBills.length ? configuredBills.map(b => {
      const paid = !!billsPaid[b.cat];
      const paidAmt = billsPaid[b.cat]?.total || 0;
      const paidDate = billsPaid[b.cat]?.date || '';
      const icon = CAT_ICONS[b.cat] || '📋';
      return `<div class="bill-item">
        <div class="bill-left">
          <div class="bill-check ${paid?'paid':'unpaid'}">${paid?'✓':'!'}</div>
          <div>
            <div class="bill-name">${icon} ${b.cat}</div>
            <div class="bill-date">${paid ? 'Dibayar '+paidDate : 'Belum dibayar bulan ini'}</div>
          </div>
        </div>
        <div class="bill-amt ${paid?'paid':'unpaid'}">${paid ? fmt(paidAmt) : fmt(b.amt)}</div>
      </div>`;
    }).join('') : '<div style="font-size:13px;color:var(--text3);padding:8px 0">Belum ada tagihan dikonfigurasi</div>';

    // Summary section — only show if there's actual data this month
    const totalBillsPaid = Object.values(billsPaid).reduce((s,v)=>s+v.total,0);
    const salary = +state.salary || 0;
    const allocHarian = +state.alloc_harian || 0;
    const tabungan = Math.max(0, salary - (+state.alloc_sewa||0) - (+state.alloc_listrik||0) - (+state.alloc_internet||0) - (+state.alloc_bpjs||0) - allocHarian);

    const summaryRows = [
      { label:'Pemasukan', color:'#00e89a', amt: monthIncome, positive: true },
      { label:'Tagihan dibayar', color:'#ff6eb4', amt: totalBillsPaid, positive: false },
      { label:'Pengeluaran harian', color:'#ff4f4f', amt: monthDailySpend, positive: false },
    ];
    const netFlow = monthIncome - totalBillsPaid - monthDailySpend;
    const allocSummaryEl = document.getElementById('alloc-summary');

    if (monthIncome > 0 || totalBillsPaid > 0 || monthDailySpend > 0) {
      allocSummaryEl.innerHTML = `
        <div class="card-title" style="margin-bottom:10px">Ringkasan Bulan Ini</div>
        ${summaryRows.filter(r=>r.amt>0).map(r=>`
          <div class="summary-row">
            <div class="summary-label">
              <div class="summary-dot" style="background:${r.color}"></div>${r.label}
            </div>
            <span class="summary-amt" style="color:${r.positive?'var(--green)':'var(--red)'}">${r.positive?'+':'-'}${fmt(r.amt)}</span>
          </div>`).join('')}
        <div class="summary-total">
          <span style="color:var(--text2)">Sisa / masuk tabungan</span>
          <span style="font-family:'DM Mono',monospace;color:${netFlow>=0?'var(--green)':'var(--red)'}">
            ${netFlow>=0?'+':''}${fmt(netFlow)}
          </span>
        </div>
        ${tabungan>0?`<div style="font-size:11px;color:var(--text3);margin-top:6px">Target tabungan bulanan: ${fmt(tabungan)}</div>`:''}
      `;
    } else {
      allocSummaryEl.innerHTML = '';
    }
  }

  // Stats
  const days = daysUntilPay();
  const { spent, extraIncome } = calcAll();
  const { spent: tSpent, income: tIncome } = calcToday();
  const target = +state.daily_target || 50000;
  const baseBudget = +state.alloc_harian || 1500000;
  const totalAvail = baseBudget + extraIncome;
  const remaining = totalAvail - spent;
  const dailyLeft = days > 0 ? remaining / days : remaining;
  const todayNet = target + tIncome - tSpent;
  const pct = Math.max(0, Math.min(100, remaining / totalAvail * 100));

  const balColor = pct < 30 ? 'red' : pct < 60 ? 'amber' : 'green';
  const barFill = pct < 30 ? '#ff4f4f' : pct < 60 ? '#ffb347' : '#00e89a';
  const dClass = dailyLeft < target*0.5 ? 'red' : dailyLeft < target*0.8 ? 'amber' : 'green';
  const tClass = todayNet < 0 ? 'red' : todayNet < target*0.3 ? 'amber' : 'green';

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Sisa budget</div>
      <div class="stat-value ${balColor}">${fmtShort(remaining)}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barFill}"></div></div>
      <div class="stat-sub">${days!==null ? days+' hari lagi' : 'set gajian'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Per hari tersisa</div>
      <div class="stat-value ${dClass}">${days>0 ? fmtShort(dailyLeft) : '—'}</div>
      <div class="stat-sub">target ${fmtShort(target)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hari ini sisa</div>
      <div class="stat-value ${tClass}">${fmtShort(todayNet)}</div>
      <div class="stat-sub">${tIncome>0?'+'+fmtShort(tIncome)+' masuk':'keluar '+fmtShort(tSpent)}</div>
    </div>
  `;

  // Log
  const BILL_CATS = ['Sewa','Listrik','Internet','BPJS','Air / PAM','Tagihan lainnya'];
  const t = todayStr();
  const list = activeTab === 'today'
    ? state.entries.filter(e => e.date === t).slice().reverse()
    : activeTab === 'bills'
    ? state.entries.filter(e => BILL_CATS.includes(e.cat)).slice().reverse()
    : state.entries.slice().reverse();

  const emptyMsg = activeTab === 'today' ? ' hari ini' : activeTab === 'bills' ? ' tagihan' : '';

  const wrap = document.getElementById('log-wrap');
  if (!list.length) {
    wrap.innerHTML = `<div class="empty">Belum ada transaksi${emptyMsg}</div>`;
  } else {
    wrap.innerHTML = list.map(e => `
      <div class="log-item">
        <div class="log-left">
          <div class="log-icon ${e.type}">${CAT_ICONS[e.cat]||'📌'}</div>
          <div>
            <div class="log-desc">${e.desc||e.cat}</div>
            <div class="log-meta">${e.cat} · ${e.date}</div>
          </div>
        </div>
        <div class="log-right">
          <span class="log-amt ${e.type}">${e.type==='in'?'+':'-'}${fmt(e.amt)}</span>
          <button class="del-btn" onclick="delEntry('${e.id}')">✕</button>
        </div>
      </div>`).join('');
  }
}

function setTab(t) {
  activeTab = t;
  document.querySelectorAll('.log-tab').forEach((el,i) => {
    el.classList.toggle('active', (i===0&&t==='today')||(i===1&&t==='all')||(i===2&&t==='bills'));
  });
  render();
}

function addEntry() {
  const amt = +document.getElementById('amt').value;
  const desc = document.getElementById('desc').value.trim();
  const cat = entryType==='in' ? document.getElementById('inc-cat').value : document.getElementById('cat').value;
  const date = document.getElementById('entry-date').value || todayStr();
  if (!amt || amt <= 0) { document.getElementById('amt').focus(); return; }
  state.entries.push({ id: Date.now()+'', amt, desc, cat, date, type: entryType });
  document.getElementById('amt').value = '';
  document.getElementById('desc').value = '';
  save();
  render();
}

function delEntry(id) {
  if (!confirm('Hapus transaksi ini?')) return;
  state.entries = state.entries.filter(e => e.id !== id);
  save();
  render();
}

function exportCSV() {
  const rows = [['Tanggal','Tipe','Kategori','Keterangan','Jumlah']];
  state.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => {
    rows.push([e.date, e.type==='in'?'Pemasukan':'Pengeluaran', e.cat, e.desc||'', e.amt]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'dompetku-'+todayStr()+'.csv';
  a.click();
}

function clearData() {
  if (!confirm('Reset semua data? Ini tidak bisa dibatalkan.')) return;
  state.entries = [];
  save();
  render();
}

render();
setInterval(render, 60000);
</script>
</body>
</html>
